services:
  app:
    container_name: shop-app
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      RUNNING_IN_DOCKER: true
    volumes:
      - ./src:/app/src
    ports:
      - '${PORT}:${PORT}'
    env_file:
      - ./.env.dev
    depends_on:
      - db
    networks:
      - auth-network
    command: ['yarn', 'dev:docker']

  db:
    container_name: shop-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - auth-network

networks:
  # app-network:
  #   driver: bridge
  auth-network:
    # external: true
    name: auth-network 
    driver: bridge

volumes:
  postgres-data:
