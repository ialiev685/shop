services:
  app:
    container_name: shop-app
    build:
      context: .
    restart: unless-stopped
    volumes:
      - ./src:/app/src
    ports:
      - '${PORT}:${PORT}'
    env_file:
      - ./.env.dev
    depends_on:
      - db
    networks:
      - app-network
      - auth-network
    command: ['yarn', 'dev:docker']

  db:
    container_name: shop-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:${DB_PORT}'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
      - auth-network

networks:
  app-network:
    driver: bridge
  auth-network:
    external: true
    name: auth-network 

volumes:
  postgres-data:
